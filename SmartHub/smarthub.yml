openapi: 3.0.0
servers:
  - url: 'http://smarthub.swagger.io/v2'
info:
  description: >-
    This is a server to remote manage Raspberry_pi pins.
  version: 1.0.0
  title: SmartHub server
tags:
  - name: usb
    description: Usb
  - name: port
    description: Port
  - name: power
    description: power
  - name: jtag
    description: jtag
  - name: boot
    description: boot    
paths: 
  '/usb':
    get:
      tags:
        - usb
      summary: Find all USB
      description: Returns all single usb
      operationId: getAllUsb
      responses:
        '200':
          description: successful operation
          content:
            application/xml:
              schema:
                $ref: '#/components/schemas/Usb'
            application/json:
              schema:
                $ref: '#/components/schemas/Usb'
        '400':
          description: Invalid ID supplied
        '404':
          description: Usb not found
  '/port':
    get:
      tags:
        - port
      summary: Find all PORT
      description: Returns all single port
      operationId: getAllPort
      responses:
        '200':
          description: successful operation
          content:
            application/xml:
              schema:
                $ref: '#/components/schemas/Port'
            application/json:
              schema:
                $ref: '#/components/schemas/Port'
        '400':
          description: Invalid ID supplied
        '404':
          description: Port not found       
  '/usb/{usbId}':
    put:
      tags:
        - usb
      summary: Find usb by ID
      description: Returns a single usb
      operationId: putUsbById
      parameters:
        - name: usbId
          in: path
          description: ID of usb to return
          required: true
          schema:
            type: integer
            format: int64
        - name: value
          in: query
          description: Or LOW or HIGH
          required: true
          schema:
            type: string
            enum: 
            - low
            - high
      responses:
        '200':
          description: successful operation
          content:
            application/xml:
              schema:
                $ref: '#/components/schemas/Usb'
            application/json:
              schema:
                $ref: '#/components/schemas/Usb'
        '400':
          description: Invalid ID supplied
        '404':
          description: Usb not found
    get:
      tags:
        - usb
      summary: Find usb by ID
      description: Returns a single usb
      operationId: getUsbById
      parameters:
        - name: usbId
          in: path
          description: ID of usb to return
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: successful operation
          content:
            application/xml:
              schema:
                $ref: '#/components/schemas/Usb'
            application/json:
              schema:
                $ref: '#/components/schemas/Usb'
        '400':
          description: Invalid ID supplied
        '404':
          description: Usb not found
  '/jtag': 
    put:
      tags:
        - jtag
      summary: jtag status
      description: modify jtag status
      operationId: putJtag
      parameters:
        - name: value
          in: query
          description: Or LOW or HIGH
          required: true
          schema:
            type: string
            enum: 
            - low
            - high
      responses:
        '200':
          description: successful operation
          content:
            application/xml:
              schema:
                $ref: '#/components/schemas/Jtag'
            application/json:
              schema:
                $ref: '#/components/schemas/Jtag'
        '400':
          description: Invalid ID supplied
        '404':
          description: jtag not found
    get:
      tags:
        - jtag
      summary: Jtag status
      description: modify jtag status
      operationId: getJatg
      responses:
        '200':
          description: successful operation
          content:
            application/xml:
              schema:
                $ref: '#/components/schemas/Jtag'
            application/json:
              schema:
                $ref: '#/components/schemas/Jtag'
        '400':
          description: Invalid ID supplied
        '404':
          description: jtag not found
  '/power': 
    put:
      tags:
        - power
      summary: power status
      description: modify power status
      operationId: putPower
      parameters:
        - name: value
          in: query
          description: Or LOW or HIGH
          required: true
          schema:
            type: string
            enum: 
            - low
            - high
      responses:
        '200':
          description: successful operation
          content:
            application/xml:
              schema:
                $ref: '#/components/schemas/Power'
            application/json:
              schema:
                $ref: '#/components/schemas/Power'
        '400':
          description: Invalid ID supplied
        '404':
          description: power not found
    get:
      tags:
        - power
      summary: Power status
      description: modify power status
      operationId: getPower
      responses:
        '200':
          description: successful operation
          content:
            application/xml:
              schema:
                $ref: '#/components/schemas/Power'
            application/json:
              schema:
                $ref: '#/components/schemas/Power'
        '400':
          description: Invalid ID supplied
        '404':
          description: power not found
  '/boot': 
    put:
      tags:
        - boot
      summary: boot status
      description: modify boot status
      operationId: putBoot
      parameters:
        - name: value
          in: query
          description: Or LOW or HIGH
          required: true
          schema:
            type: string
            enum: 
            - low
            - high
      responses:
        '200':
          description: successful operation
          content:
            application/xml:
              schema:
                $ref: '#/components/schemas/Boot'
            application/json:
              schema:
                $ref: '#/components/schemas/Boot'
        '400':
          description: Invalid ID supplied
        '404':
          description: Boot not found
    get:
      tags:
        - boot
      summary: Boot status
      description: modify boot status
      operationId: getBoot
      responses:
        '200':
          description: successful operation
          content:
            application/xml:
              schema:
                $ref: '#/components/schemas/Boot'
            application/json:
              schema:
                $ref: '#/components/schemas/Boot'
        '400':
          description: Invalid ID supplied
        '404':
          description: boot not found        
components:
  requestBodies:
    Usb:
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Usb'
        application/xml:
          schema:
            $ref: '#/components/schemas/Usb'
      description: Usb dynamics
      required: true
    Port:
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Port'
        application/xml:
          schema:
            $ref: '#/components/schemas/Port'
      description: Port dynamics
      required: true  
    jtag:
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Jtag'
        application/xml:
          schema:
            $ref: '#/components/schemas/Jtag'
      description: jtag dynamics
      required: true
    power:
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Power'
        application/xml:
          schema:
            $ref: '#/components/schemas/Power'
      description: Power dynamics
      required: true
    boot:
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Boot'
        application/xml:
          schema:
            $ref: '#/components/schemas/Boot'
      description: Boot dynamics
      required: true  
  schemas:
    Usb:
      title: the Usb
      description: usb status
      type: object
      required:
        - name
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
          example: usb1
        status:
          type: string
          description: usb status
          deprecated: true
          enum:
            - low
            - high
      xml:
        name: Usb
    Port:
      title: the Port
      description: port status
      type: object
      required:
        - name
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
          example: port
        status:
          type: string
          description: port status
          deprecated: true
          enum:
            - low
            - high
      xml:
        name: Usb    
    Jtag:
      title: the Jtag
      description: jtag status
      type: object
      required:
        - name
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
          example: jtag
        status:
          type: string
          description: usb status
          deprecated: true
          enum:
            - low
            - high
      xml:
        name: Jtag
    Power:
      title: the Power
      description: Power status
      type: object
      required:
        - name
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
          example: power
        status:
          type: string
          description: Power status
          deprecated: true
          enum:
            - low
            - high
      xml:
        name: Power
    Boot:
      title: the Boot
      description: Boot status
      type: object
      required:
        - name
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
          example: boot
        status:
          type: string
          description: Boot status
          deprecated: true
          enum:
            - low
            - high
      xml:
        name: Boot