openapi: 3.0.0
info:
  description: This is a server to remote manage Raspberry_pi pins.
  title: SmartHub server
  version: 1.0.0
servers:
- url: http://smarthub.swagger.io/v2
tags:
- description: Usb
  name: usb
- description: Port
  name: port
- description: power
  name: power
- description: jtag
  name: jtag
- description: boot
  name: boot
paths:
  /boot:
    get:
      description: modify boot status
      operationId: get_boot
      responses:
        "200":
          content:
            application/xml:
              schema:
                $ref: '#/components/schemas/Boot'
            application/json:
              schema:
                $ref: '#/components/schemas/Boot'
          description: successful operation
        "400":
          description: Invalid ID supplied
        "404":
          description: boot not found
      summary: Boot status
      tags:
      - boot
      x-openapi-router-controller: openapi_server.controllers.boot_controller
    put:
      description: modify boot status
      operationId: put_boot
      parameters:
      - description: Or LOW or HIGH
        explode: true
        in: query
        name: value
        required: true
        schema:
          enum:
          - low
          - high
          type: string
        style: form
      responses:
        "200":
          content:
            application/xml:
              schema:
                $ref: '#/components/schemas/Boot'
            application/json:
              schema:
                $ref: '#/components/schemas/Boot'
          description: successful operation
        "400":
          description: Invalid ID supplied
        "404":
          description: Boot not found
      summary: boot status
      tags:
      - boot
      x-openapi-router-controller: openapi_server.controllers.boot_controller
  /jtag:
    get:
      description: modify jtag status
      operationId: get_jatg
      responses:
        "200":
          content:
            application/xml:
              schema:
                $ref: '#/components/schemas/Jtag'
            application/json:
              schema:
                $ref: '#/components/schemas/Jtag'
          description: successful operation
        "400":
          description: Invalid ID supplied
        "404":
          description: jtag not found
      summary: Jtag status
      tags:
      - jtag
      x-openapi-router-controller: openapi_server.controllers.jtag_controller
    put:
      description: modify jtag status
      operationId: put_jtag
      parameters:
      - description: Or LOW or HIGH
        explode: true
        in: query
        name: value
        required: true
        schema:
          enum:
          - low
          - high
          type: string
        style: form
      responses:
        "200":
          content:
            application/xml:
              schema:
                $ref: '#/components/schemas/Jtag'
            application/json:
              schema:
                $ref: '#/components/schemas/Jtag'
          description: successful operation
        "400":
          description: Invalid ID supplied
        "404":
          description: jtag not found
      summary: jtag status
      tags:
      - jtag
      x-openapi-router-controller: openapi_server.controllers.jtag_controller
  /port:
    get:
      description: Returns all single port
      operationId: get_all_port
      responses:
        "200":
          content:
            application/xml:
              schema:
                $ref: '#/components/schemas/Port'
            application/json:
              schema:
                $ref: '#/components/schemas/Port'
          description: successful operation
        "400":
          description: Invalid ID supplied
        "404":
          description: Port not found
      summary: Find all PORT
      tags:
      - port
      x-openapi-router-controller: openapi_server.controllers.port_controller
  /power:
    get:
      description: modify power status
      operationId: get_power
      responses:
        "200":
          content:
            application/xml:
              schema:
                $ref: '#/components/schemas/Power'
            application/json:
              schema:
                $ref: '#/components/schemas/Power'
          description: successful operation
        "400":
          description: Invalid ID supplied
        "404":
          description: power not found
      summary: Power status
      tags:
      - power
      x-openapi-router-controller: openapi_server.controllers.power_controller
    put:
      description: modify power status
      operationId: put_power
      parameters:
      - description: Or LOW or HIGH
        explode: true
        in: query
        name: value
        required: true
        schema:
          enum:
          - low
          - high
          type: string
        style: form
      responses:
        "200":
          content:
            application/xml:
              schema:
                $ref: '#/components/schemas/Power'
            application/json:
              schema:
                $ref: '#/components/schemas/Power'
          description: successful operation
        "400":
          description: Invalid ID supplied
        "404":
          description: power not found
      summary: power status
      tags:
      - power
      x-openapi-router-controller: openapi_server.controllers.power_controller
  /usb:
    get:
      description: Returns all single usb
      operationId: get_all_usb
      responses:
        "200":
          content:
            application/xml:
              schema:
                $ref: '#/components/schemas/Usb'
            application/json:
              schema:
                $ref: '#/components/schemas/Usb'
          description: successful operation
        "400":
          description: Invalid ID supplied
        "404":
          description: Usb not found
      summary: Find all USB
      tags:
      - usb
      x-openapi-router-controller: openapi_server.controllers.usb_controller
  /usb/{usbId}:
    get:
      description: Returns a single usb
      operationId: get_usb_by_id
      parameters:
      - description: ID of usb to return
        explode: false
        in: path
        name: usbId
        required: true
        schema:
          format: int64
          type: integer
        style: simple
      responses:
        "200":
          content:
            application/xml:
              schema:
                $ref: '#/components/schemas/Usb'
            application/json:
              schema:
                $ref: '#/components/schemas/Usb'
          description: successful operation
        "400":
          description: Invalid ID supplied
        "404":
          description: Usb not found
      summary: Find usb by ID
      tags:
      - usb
      x-openapi-router-controller: openapi_server.controllers.usb_controller
    put:
      description: Returns a single usb
      operationId: put_usb_by_id
      parameters:
      - description: ID of usb to return
        explode: false
        in: path
        name: usbId
        required: true
        schema:
          format: int64
          type: integer
        style: simple
      - description: Or LOW or HIGH
        explode: true
        in: query
        name: value
        required: true
        schema:
          enum:
          - low
          - high
          type: string
        style: form
      responses:
        "200":
          content:
            application/xml:
              schema:
                $ref: '#/components/schemas/Usb'
            application/json:
              schema:
                $ref: '#/components/schemas/Usb'
          description: successful operation
        "400":
          description: Invalid ID supplied
        "404":
          description: Usb not found
      summary: Find usb by ID
      tags:
      - usb
      x-openapi-router-controller: openapi_server.controllers.usb_controller
components:
  requestBodies:
    Usb:
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Usb'
        application/xml:
          schema:
            $ref: '#/components/schemas/Usb'
      description: Usb dynamics
      required: true
    Port:
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Port'
        application/xml:
          schema:
            $ref: '#/components/schemas/Port'
      description: Port dynamics
      required: true
    jtag:
