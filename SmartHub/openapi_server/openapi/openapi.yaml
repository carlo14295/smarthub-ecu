  schemas:
    Usb:
      description: usb status
      example:
        name: usb1
        id: 0
        status: low
      properties:
        id:
          format: int64
          title: id
          type: integer
        name:
          example: usb1
          title: name
          type: string
        status:
          deprecated: true
          description: usb status
          enum:
          - low
          - high
          title: status
          type: string
      required:
      - name
      title: the Usb
      type: object
      xml:
        name: Usb
    Port:
      description: port status
      example:
        name: port
        id: 0
        status: low
      properties:
        id:
          format: int64
          title: id
          type: integer
        name:
          example: port
          title: name
          type: string
        status:
          deprecated: true
          description: port status
          enum:
          - low
          - high
          title: status
          type: string
      required:
      - name
      title: the Port
      type: object
      xml:
        name: Usb
    Jtag:
      description: jtag status
      example:
        name: jtag
        id: 0
        status: low
      properties:
        id:
          format: int64
          title: id
          type: integer
        name:
          example: jtag
          title: name
          type: string
        status:
          deprecated: true
          description: usb status
          enum:
          - low
          - high
          title: status
          type: string
      required:
      - name
      title: the Jtag
      type: object
      xml:
        name: Jtag
    Power:
      description: Power status
      example:
        name: power
